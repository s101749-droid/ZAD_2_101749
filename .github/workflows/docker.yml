name: Build, scan and push image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CACHE_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/zad2-cache:buildcache
  LOCAL_IMAGE: localhost:5000/myapp:latest

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."localhost:5000"]
              http = true
              insecure = true

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-arch image to local registry
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Scan amd64 image with Trivy
        run: |
          docker run --rm --network host aquasec/trivy:latest image \
            --platform linux/amd64 \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            ${{ env.LOCAL_IMAGE }}

      - name: Scan arm64 image with Trivy
        run: |
          docker run --rm --network host aquasec/trivy:latest image \
            --platform linux/arm64 \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            ${{ env.LOCAL_IMAGE }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push clean multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max
